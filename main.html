<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Layout</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #043873 0%, #1a3f85 40%, #245eac 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: transparent;
      padding: 15px 30px;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar .logo {
      color: white;
      font-weight: bold;
      font-size: 28px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      text-decoration: none;
      color: white;
      font-size: 20px;
      padding: 15px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .nav-links li a:hover {
      background-color: #4F9CF9;
    }

    .upload-container {
      background: white;
      color: #043873;
      padding: 60px;
      border-radius: 15px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 800px;
    }

    .upload-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .upload-header h1 {
      font-size: 28px;
      font-weight: 600;
      margin: 30px;
    }

    .upload-box {
      border: 2px dashed #4F9CF9;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      transition: background-color 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .upload-box:hover {
      background-color: #f0f8ff;
    }

    .upload-box p {
      font-size: 20px;
      color: #245eac;
      margin: 0;
    }

    .upload-box input[type="file"] {
      display: none;
    }

    .submit-button {
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background-color: #4F9CF9;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 30px;
      display: block;
      width: 100%;
      transition: background-color 0.3s ease, transform 0.2s;
    }

    .submit-button:hover {
      background-color: #357ae8;
      transform: scale(1.05);
    }

    .result-box {
      background: #e8f4ff;
      color: #043873;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-top: 20px;
      display: none; /* Initially hidden */
    }

    .result-box p {
      font-size: 18px;
      margin: 0;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">MicroClassify</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#mission">Our Mission</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  
  <div class="upload-container">
    <form id="uploadForm">
      <div class="upload-header">
        <h1>Select File</h1>
        <label class="upload-box">
          <input type="file" name="file" id="file-input">
          <p>Upload Image from your computer</p>
        </label>
      </div>
      <button type="submit" class="submit-button">Submit</button>
    </form>

    <div class="result-box" id="result-box">
      <p id="result-message">Your file has been successfully uploaded!</p>
    </div>
  </div>

  <script>
    const uploadForm = document.getElementById('uploadForm');
    const fileInput = document.getElementById('file-input');
    const resultBox = document.getElementById('result-box');
    const resultMessage = document.getElementById('result-message');

    uploadForm.addEventListener('submit', function (event) {
      event.preventDefault(); // Prevent form submission
      if (fileInput.files.length > 0) {
        // Display the result box with a success message
        resultMessage.textContent = `You have selected: ${fileInput.files[0].name}`;
        resultBox.style.display = 'block';
      } else {
        // Show an error message if no file is selected
        resultMessage.textContent = 'Please select a file to upload.';
        resultBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
